<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Privacy Policy – Polskie Czytanki</title>
    <meta name="description" content="Privacy Policy for Polskie Czytanki iOS app.">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: #1d1d1f;
            background-color: #f5f5f7;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            background: #ffffff;
            padding: 48px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            flex-wrap: wrap;
            gap: 16px;
        }

        h1 {
            font-size: 2rem;
            color: #1d1d1f;
        }

        h2 {
            font-size: 1.3rem;
            margin-top: 28px;
            margin-bottom: 12px;
            color: #1d1d1f;
        }

        p, li {
            margin-bottom: 12px;
            color: #424245;
        }

        ul {
            padding-left: 24px;
            margin-bottom: 12px;
        }

        a {
            color: #0071e3;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .lang-switcher {
            display: flex;
            gap: 8px;
        }

        .lang-btn {
            background: #f5f5f7;
            border: 1px solid #d2d2d7;
            color: #1d1d1f;
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }

        .lang-btn:hover {
            background: #e8e8ed;
        }

        .lang-btn.active {
            background: #0071e3;
            color: #ffffff;
            border-color: #0071e3;
        }

        .updated {
            font-style: italic;
            color: #6e6e73;
            font-size: 0.9rem;
            margin-bottom: 24px;
        }

        footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #e5e5ea;
            text-align: center;
            color: #6e6e73;
            font-size: 0.85rem;
        }

        @media (max-width: 600px) {
            .container {
                padding: 24px;
                margin: 10px auto;
            }
            h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1 id="title">Privacy Policy</h1>
            <div class="lang-switcher">
                <button class="lang-btn active" onclick="setLanguage('en')" id="btn-en">EN</button>
                <button class="lang-btn" onclick="setLanguage('pl')" id="btn-pl">PL</button>
            </div>
        </header>

        <p class="updated" id="updated">Last updated: May 26, 2026</p>

        <div id="content"></div>

        <footer>
            <p>&copy; 2026 Sebastian Strus. Polskie Czytanki.</p>
        </footer>
    </div>

    <script>
        const translations = {
            en: {
                title: "Privacy Policy",
                updated: "Last updated: May 26, 2026",
                content: `
                    <p>This Privacy Policy describes how <strong>Polskie Czytanki</strong> ("the App", "we", "us") handles information when you use our iOS application. By using the App, you agree to the terms described in this policy.</p>

                    <h2>1. Information We Collect</h2>
                    <p>Polskie Czytanki is designed to respect your privacy. We do <strong>not</strong> collect, store, or share any personally identifiable information.</p>
                    <ul>
                        <li>We do not require account registration.</li>
                        <li>We do not collect your name, email address, phone number, or location.</li>
                        <li>We do not access your photos, contacts, microphone, or camera.</li>
                    </ul>

                    <h2>2. Data Stored on Your Device</h2>
                    <p>The App may store the following information locally on your device only:</p>
                    <ul>
                        <li>Your reading progress and preferences.</li>
                        <li>Purchase status for premium content (managed by Apple).</li>
                    </ul>
                    <p>This data never leaves your device and is removed when you uninstall the App.</p>

                    <h2>3. In-App Purchases</h2>
                    <p>The App offers in-app purchases processed by Apple via the App Store. We do not receive or store your payment information. All transactions are handled by Apple and governed by Apple's Privacy Policy.</p>

                    <h2>4. Third-Party Services</h2>
                    <p>The App may use the following Apple-provided services:</p>
                    <ul>
                        <li><strong>StoreKit</strong> – for managing in-app purchases.</li>
                    </ul>
                    <p>We do not use any third-party analytics, advertising, or tracking SDKs.</p>

                    <h2>5. Children's Privacy</h2>
                    <p>The App is suitable for all ages, including children. Since we do not collect any personal information, the App complies with the Children's Online Privacy Protection Act (COPPA) and similar regulations.</p>

                    <h2>6. Changes to This Policy</h2>
                    <p>We may update this Privacy Policy from time to time. Any changes will be posted on this page with an updated revision date.</p>

                    <h2>7. Contact</h2>
                    <p>If you have any questions about this Privacy Policy, please contact us at:<br>
                    <a href="mailto:nordic.apps.feedback@gmail.com">nordic.apps.feedback@gmail.com</a></p>
                `
            },
            pl: {
                title: "Polityka Prywatności",
                updated: "Ostatnia aktualizacja: 26 maja 2026",
                content: `
                    <p>Niniejsza Polityka Prywatności opisuje, w jaki sposób aplikacja <strong>Polskie Czytanki</strong> ("Aplikacja", "my") obsługuje informacje podczas korzystania z naszej aplikacji na system iOS. Korzystając z Aplikacji, akceptujesz warunki opisane w niniejszej polityce.</p>

                    <h2>1. Informacje, które zbieramy</h2>
                    <p>Aplikacja Polskie Czytanki została zaprojektowana z poszanowaniem Twojej prywatności. <strong>Nie</strong> zbieramy, nie przechowujemy ani nie udostępniamy żadnych danych osobowych.</p>
                    <ul>
                        <li>Nie wymagamy rejestracji konta.</li>
                        <li>Nie zbieramy Twojego imienia, adresu e-mail, numeru telefonu ani lokalizacji.</li>
                        <li>Nie uzyskujemy dostępu do Twoich zdjęć, kontaktów, mikrofonu ani aparatu.</li>
                    </ul>

                    <h2>2. Dane przechowywane na Twoim urządzeniu</h2>
                    <p>Aplikacja może przechowywać następujące informacje wyłącznie lokalnie na Twoim urządzeniu:</p>
                    <ul>
                        <li>Postępy i preferencje czytania.</li>
                        <li>Status zakupów treści premium (zarządzany przez Apple).</li>
                    </ul>
                    <p>Te dane nigdy nie opuszczają Twojego urządzenia i są usuwane po odinstalowaniu Aplikacji.</p>

                    <h2>3. Zakupy w aplikacji</h2>
                    <p>Aplikacja oferuje zakupy wewnątrz aplikacji obsługiwane przez Apple za pośrednictwem App Store. Nie otrzymujemy ani nie przechowujemy informacji o Twoich płatnościach. Wszystkie transakcje są obsługiwane przez Apple i podlegają Polityce Prywatności Apple.</p>

                    <h2>4. Usługi zewnętrzne</h2>
                    <p>Aplikacja może korzystać z następujących usług dostarczanych przez Apple:</p>
                    <ul>
                        <li><strong>StoreKit</strong> – do zarządzania zakupami w aplikacji.</li>
                    </ul>
                    <p>Nie korzystamy z żadnych zewnętrznych narzędzi analitycznych, reklamowych ani śledzących.</p>

                    <h2>5. Prywatność dzieci</h2>
                    <p>Aplikacja jest odpowiednia dla użytkowników w każdym wieku, w tym dzieci. Ponieważ nie zbieramy żadnych danych osobowych, Aplikacja jest zgodna z ustawą o ochronie prywatności dzieci w internecie (COPPA) oraz podobnymi przepisami.</p>

                    <h2>6. Zmiany w niniejszej Polityce</h2>
                    <p>Możemy okresowo aktualizować niniejszą Politykę Prywatności. Wszelkie zmiany zostaną opublikowane na tej stronie wraz ze zaktualizowaną datą rewizji.</p>

                    <h2>7. Kontakt</h2>
                    <p>W przypadku pytań dotyczących niniejszej Polityki Prywatności prosimy o kontakt:<br>
                    <a href="mailto:nordic.apps.feedback@gmail.com">nordic.apps.feedback@gmail.com</a></p>
                `
            }
        };

        function setLanguage(lang) {
            const t = translations[lang];
            document.getElementById('title').textContent = t.title;
            document.getElementById('updated').textContent = t.updated;
            document.getElementById('content').innerHTML = t.content;
            document.documentElement.lang = lang;
            document.title = t.title + " – Polskie Czytanki";

            document.getElementById('btn-en').classList.toggle('active', lang === 'en');
            document.getElementById('btn-pl').classList.toggle('active', lang === 'pl');

            localStorage.setItem('preferredLang', lang);
        }

        const savedLang = localStorage.getItem('preferredLang');
        const browserLang = navigator.language.startsWith('pl') ? 'pl' : 'en';
        setLanguage(savedLang || browserLang);
    </script>
</body>
</html>
