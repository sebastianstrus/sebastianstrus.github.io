<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Privacy Policy – Sagolandet</title>
    <meta name="description" content="Privacy Policy for Sagolandet iOS app.">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: #1d1d1f;
            background-color: #f5f5f7;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            background: #ffffff;
            padding: 48px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            flex-wrap: wrap;
            gap: 16px;
        }

        h1 {
            font-size: 2rem;
            color: #1d1d1f;
        }

        h2 {
            font-size: 1.3rem;
            margin-top: 28px;
            margin-bottom: 12px;
            color: #1d1d1f;
        }

        p, li {
            margin-bottom: 12px;
            color: #424245;
        }

        ul {
            padding-left: 24px;
            margin-bottom: 12px;
        }

        a {
            color: #0071e3;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .lang-switcher {
            display: flex;
            gap: 8px;
        }

        .lang-btn {
            background: #f5f5f7;
            border: 1px solid #d2d2d7;
            color: #1d1d1f;
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }

        .lang-btn:hover {
            background: #e8e8ed;
        }

        .lang-btn.active {
            background: #0071e3;
            color: #ffffff;
            border-color: #0071e3;
        }

        .updated {
            font-style: italic;
            color: #6e6e73;
            font-size: 0.9rem;
            margin-bottom: 24px;
        }

        footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #e5e5ea;
            text-align: center;
            color: #6e6e73;
            font-size: 0.85rem;
        }

        @media (max-width: 600px) {
            .container {
                padding: 24px;
                margin: 10px auto;
            }
            h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1 id="title">Privacy Policy</h1>
            <div class="lang-switcher">
                <button class="lang-btn active" onclick="setLanguage('en')" id="btn-en">EN</button>
                <button class="lang-btn" onclick="setLanguage('sv')" id="btn-sv">SV</button>
            </div>
        </header>

        <p class="updated" id="updated">Last updated: May 26, 2026</p>

        <div id="content"></div>

        <footer>
            <p>&copy; 2026 Sebastian Strus. Sagolandet.</p>
        </footer>
    </div>

    <script>
        const translations = {
            en: {
                title: "Privacy Policy",
                updated: "Last updated: May 26, 2026",
                content: `
                    <p>This Privacy Policy describes how <strong>Sagolandet</strong> ("the App", "we", "us") handles information when you use our iOS application. By using the App, you agree to the terms described in this policy.</p>

                    <h2>1. Information We Collect</h2>
                    <p>Sagolandet is designed to respect your privacy. We do <strong>not</strong> collect, store, or share any personally identifiable information.</p>
                    <ul>
                        <li>We do not require account registration.</li>
                        <li>We do not collect your name, email address, phone number, or location.</li>
                        <li>We do not access your photos, contacts, microphone, or camera.</li>
                    </ul>

                    <h2>2. Data Stored on Your Device</h2>
                    <p>The App may store the following information locally on your device only:</p>
                    <ul>
                        <li>Your reading progress and preferences.</li>
                        <li>Purchase status for premium content (managed by Apple).</li>
                    </ul>
                    <p>This data never leaves your device and is removed when you uninstall the App.</p>

                    <h2>3. In-App Purchases</h2>
                    <p>The App offers in-app purchases processed by Apple via the App Store. We do not receive or store your payment information. All transactions are handled by Apple and governed by Apple's Privacy Policy.</p>

                    <h2>4. Third-Party Services</h2>
                    <p>The App may use the following Apple-provided services:</p>
                    <ul>
                        <li><strong>StoreKit</strong> – for managing in-app purchases.</li>
                    </ul>
                    <p>We do not use any third-party analytics, advertising, or tracking SDKs.</p>

                    <h2>5. Children's Privacy</h2>
                    <p>The App is suitable for all ages, including children. Since we do not collect any personal information, the App complies with the Children's Online Privacy Protection Act (COPPA) and similar regulations.</p>

                    <h2>6. Changes to This Policy</h2>
                    <p>We may update this Privacy Policy from time to time. Any changes will be posted on this page with an updated revision date.</p>

                    <h2>7. Contact</h2>
                    <p>If you have any questions about this Privacy Policy, please contact us at:<br>
                    <a href="mailto:nordic.apps.feedback@gmail.com">nordic.apps.feedback@gmail.com</a></p>
                `
            },
            sv: {
                title: "Integritetspolicy",
                updated: "Senast uppdaterad: 26 maj 2026",
                content: `
                    <p>Denna integritetspolicy beskriver hur <strong>Sagolandet</strong> ("appen", "vi", "oss") hanterar information när du använder vår iOS-applikation. Genom att använda appen godkänner du villkoren i denna policy.</p>

                    <h2>1. Information vi samlar in</h2>
                    <p>Sagolandet är utformad för att respektera din integritet. Vi samlar <strong>inte</strong> in, lagrar eller delar någon personligt identifierbar information.</p>
                    <ul>
                        <li>Vi kräver ingen kontoregistrering.</li>
                        <li>Vi samlar inte in ditt namn, din e-postadress, ditt telefonnummer eller din platsinformation.</li>
                        <li>Vi begär inte tillgång till dina foton, kontakter, mikrofon eller kamera.</li>
                    </ul>

                    <h2>2. Data som lagras på din enhet</h2>
                    <p>Appen kan lagra följande information lokalt på din enhet:</p>
                    <ul>
                        <li>Dina läsframsteg och inställningar.</li>
                        <li>Köpstatus för premiuminnehåll (hanteras av Apple).</li>
                    </ul>
                    <p>Denna data lämnar aldrig din enhet och raderas när du avinstallerar appen.</p>

                    <h2>3. Köp i appen</h2>
                    <p>Appen erbjuder köp inuti appen som behandlas av Apple via App Store. Vi tar inte emot eller lagrar dina betalningsuppgifter. Alla transaktioner hanteras av Apple och omfattas av Apples integritetspolicy.</p>

                    <h2>4. Tredjepartstjänster</h2>
                    <p>Appen kan använda följande tjänster som tillhandahålls av Apple:</p>
                    <ul>
                        <li><strong>StoreKit</strong> – för hantering av köp i appen.</li>
                    </ul>
                    <p>Vi använder inga externa verktyg för analys, annonsering eller spårning (SDK:er).</p>

                    <h2>5. Barns integritet</h2>
                    <p>Appen är lämplig för alla åldrar, inklusive barn. Eftersom vi inte samlar in någon personlig information uppfyller appen kraven i Children's Online Privacy Protection Act (COPPA) och liknande regleringar.</p>

                    <h2>6. Ändringar i denna policy</h2>
                    <p>Vi kan komma att uppdatera denna integritetspolicy från tid till annan. Eventuella ändringar kommer att publiceras på denna sida med ett uppdaterat revideringsdatum.</p>

                    <h2>7. Kontakt</h2>
                    <p>Om du har några frågor om denna integritetspolicy, vänligen kontakta oss på:<br>
                    <a href="mailto:nordic.apps.feedback@gmail.com">nordic.apps.feedback@gmail.com</a></p>
                `
            }
        };

        function setLanguage(lang) {
            const t = translations[lang];
            document.getElementById('title').textContent = t.title;
            document.getElementById('updated').textContent = t.updated;
            document.getElementById('content').innerHTML = t.content;
            document.documentElement.lang = lang;
            document.title = t.title + " – Sagolandet";

            document.getElementById('btn-en').classList.toggle('active', lang === 'en');
            document.getElementById('btn-sv').classList.toggle('active', lang === 'sv');

            localStorage.setItem('preferredLang', lang);
        }

        const savedLang = localStorage.getItem('preferredLang');
        const browserLang = navigator.language.startsWith('sv') ? 'sv' : 'en';
        setLanguage(savedLang || browserLang);
    </script>
</body>
</html>
